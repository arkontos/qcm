{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 10vh auto;">
    <div class="card p-4">
        <h2 class="text-center mb-4">{{ _('Change Password') }}</h2>

        <form action="{{ url_for('auth.change_password') }}" method="POST">
            <div class="form-group">
                <label for="current_password">{{ _('Current Password') }}</label>
                <input type="password" id="current_password" name="current_password" required>
            </div>
            <div class="form-group">
                <label for="new_password">{{ _('New Password') }}</label>
                <input type="password" id="new_password" name="new_password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">{{ _('Confirm New Password') }}</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">{{ _('Update Password') }}</button>
        </form>
    </div>
</div>
{% endblock %}
