{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 10vh auto;">
    <div class="card p-4">
        <h2 class="text-center mb-4">{{ _('Login') }}</h2>



        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email">{{ _('Email Address') }}</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">{{ _('Password') }}</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">{{ _('Sign In') }}</button>
        </form>
        <div class="text-center mt-4">
            <span style="color: var(--text-muted); font-size: 0.875rem;">{{ _("Don't have an account?") }} <a
                    href="{{ url_for('auth.register') }}" style="color: var(--text-color); font-weight: 500;">{{
                    _('Register
                    here') }}</a></span>
        </div>
    </div>
</div>
{% endblock %}
