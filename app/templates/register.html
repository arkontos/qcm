{% extends 'base.html' %}

{% block title %}{{ _('Register - QCM Platform') }}{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="card p-4">
        <h2 style="text-align: center; margin-bottom: 2rem;">{{ _('Student Registration') }}</h2>



        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">{{ _('Username') }}</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">{{ _('Password') }}</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">{{ _('Confirm Password') }}</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">{{ _('Register')
                }}</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
            {{ _("Already have an account?") }} <a href="{{ url_for('auth.login') }}"
                style="color: var(--text-color); font-weight: 500;">{{ _('Login here') }}</a>.
        </div>
    </div>
</div>
{% endblock %}
